name: Daily Barttorvik + EvanMiya Stats CSV
 
on:
  schedule:
    # Runs every day at 6:00 AM UTC (midnight Mountain Time)
    - cron: "0 6 * * *"
  workflow_dispatch:  # Allows manual trigger from the Actions tab
 
jobs:
  convert:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
 
      - name: Run conversion scripts
        env:
          EVANMIYA_FIREBASE_API_KEY: ${{ secrets.EVANMIYA_FIREBASE_API_KEY }}
          EVANMIYA_REFRESH_TOKEN: ${{ secrets.EVANMIYA_REFRESH_TOKEN }}
        run: |
          python convert_barttorvik.py 2026
 
      - name: Commit and push updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add barttorvik_2026.csv evanmiya_2026.csv
          git diff --cached --quiet || git commit -m "chore: update CSVs [$(date -u '+%Y-%m-%d')]"
          git push
